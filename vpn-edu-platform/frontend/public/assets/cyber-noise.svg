<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="3" stitchTiles="noStitch" />
    </filter>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55" />
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.35" />
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="black" />
  <rect width="600" height="600" filter="url(#noise)" opacity="0.65" />
  <circle cx="80" cy="60" r="90" fill="url(#glow)" opacity="0.35" />
  <circle cx="520" cy="520" r="120" fill="url(#glow)" opacity="0.45" />
</svg>

